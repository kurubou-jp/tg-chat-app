<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>らいのチャット</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg-color: #74bad4; --header-color: #2c3e50; --msg-me: #85e249; --msg-other: #ffffff; }
        
        /* 全体設定 */
        body { 
            font-family: sans-serif; 
            margin: 0; 
            background: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            overflow: hidden; /* 画面の揺れ防止 */
        }

        #app { 
            width: 100%; 
            max-width: 450px; 
            height: 100%; 
            background: white; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }

        /* 画面切り替え */
        .screen { display: none; padding: 20px; flex-direction: column; height: 100%; box-sizing: border-box; }
        .active { display: flex; }

        /* ボタン（iPad/スマホ対応） */
        button { 
            padding: 15px; 
            border: none; 
            border-radius: 12px; 
            background: var(--header-color); 
            color: white; 
            cursor: pointer; 
            margin-top: 10px; 
            font-weight: bold; 
            font-size: 16px;
            touch-action: manipulation; /* iPadの反応を速くする */
            -webkit-tap-highlight-color: transparent;
        }
        button:active { opacity: 0.7; }

        /* アイコン選択 */
        .icon-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 10px; 
            margin: 15px 0; 
            overflow-y: auto; 
            max-height: 180px;
            padding: 5px;
        }
        .icon-item { 
            font-size: 28px; 
            text-align: center; 
            padding: 8px; 
            border: 2px solid #eee; 
            border-radius: 10px; 
            cursor: pointer; 
        }
        .icon-item.selected { border-color: #3498db; background: #ebf5fb; }

        input { 
            padding: 15px; 
            border: 1px solid #ddd; 
            border-radius: 10px; 
            margin-bottom: 10px; 
            font-size: 16px; 
            outline: none;
        }

        /* チャットエリア */
        .chat-header { background: var(--header-color); color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
        .chat-messages { 
            flex: 1; 
            background: var(--bg-color); 
            padding: 15px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            -webkit-overflow-scrolling: touch; /* iOSのスクロールを滑らかに */
        }
        
        /* 吹き出し */
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.4; position: relative; word-wrap: break-word; }
        .msg.me { align-self: flex-end; background: var(--msg-me); border-bottom-right-radius: 2px; }
        .msg.other { align-self: flex-start; background: var(--msg-other); border-bottom-left-radius: 2px; }
        .msg-info { font-size: 11px; color: rgba(0,0,0,0.6); margin-bottom: 3px; font-weight: bold; }
        .msg-sys { align-self: center; background: rgba(0,0,0,0.15); color: white; padding: 5px 15px; border-radius: 20px; font-size: 12px; margin: 5px 0; }

        .chat-input-area { display: flex; padding: 15px; border-top: 1px solid #ddd; background: #fff; }
        .chat-input-area input { flex: 1; margin-right: 10px; margin-bottom: 0; }
    </style>
</head>
<body>
<div id="app">
    <div id="screen-main" class="screen active">
        <h1 style="text-align:center; color: var(--header-color);">らいのチャット</h1>
        <div style="flex:1; display:flex; flex-direction:column; justify-content:center;">
            <button onclick="goToProfile('create')">新しくルームを作る</button>
            <button onclick="goToProfile('join')">合言葉で参加する</button>
        </div>
    </div>

    <div id="screen-profile" class="screen">
        <h3>プロフィール設定</h3>
        <input type="text" id="nickname" placeholder="ニックネームを入力" maxlength="10">
        <p style="font-size:14px; color:#666;">アイコンを選んでね</p>
        <div class="icon-grid" id="icon-grid"></div>
        <button onclick="handleProfileNext()">次へ進む</button>
    </div>

    <div id="screen-create-type" class="screen">
        <h3>ルーム作成</h3>
        <input type="text" id="custom-room-id" placeholder="好きな合言葉（空ならランダム）">
        <button onclick="createWithId()">この合言葉で作る</button>
        <button onclick="showScreen('screen-main')" style="background:#95a5a6;">戻る</button>
    </div>

    <div id="screen-room-input" class="screen">
        <h3>参加する</h3>
        <input type="text" id="room-id-input" placeholder="合言葉を入力">
        <button onclick="joinRoom()">入室する</button>
        <button onclick="showScreen('screen-main')" style="background:#95a5a6;">戻る</button>
    </div>

    <div id="screen-chat" class="screen" style="padding:0">
        <div class="chat-header">
            <strong id="chat-room-display">ID: ----</strong>
            <button onclick="exitAction()" style="background:#e74c3c; font-size:12px; padding:6px 12px; margin-top:0;" id="exit-btn">退出</button>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <form class="chat-input-area" onsubmit="sendMessage(); return false;">
            <input type="text" id="message-input" placeholder="メッセージ..." autocomplete="off">
            <button type="submit">送信</button>
        </form>
    </div>
</div>

<script>
    // Socket.io 接続設定（iPad/iPhoneの切断対策）
    const socket = io({
        transports: ['websocket', 'polling'],
        reconnectionAttempts: 10,
        timeout: 10000
    });

    let mode = '', selectedIcon = '', myData = { nickname: '', icon: '', roomId: '', isOwner: false };
    const icons = ["😊", "🐱", "🐶", "🦊", "🐻", "🐯", "🤖", "👻", "⭐", "🍀", "🎨", "🎮", "⚽", "🍎", "🚀", "💎", "🐳", "🍕", "🌈", "🔥"];

    // アイコン一覧の作成
    const iconGrid = document.getElementById('icon-grid');
    icons.forEach(icon => {
        const div = document.createElement('div');
        div.className = 'icon-item';
        div.innerText = icon;
        div.onclick = () => {
            document.querySelectorAll('.icon-item').forEach(el => el.classList.remove('selected'));
            div.classList.add('selected');
            selectedIcon = icon;
        };
        iconGrid.appendChild(div);
    });

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function goToProfile(m) { mode = m; showScreen('screen-profile'); }

    function handleProfileNext() {
        myData.nickname = document.getElementById('nickname').value.trim();
        myData.icon = selectedIcon;
        if (!myData.nickname || !selectedIcon) return alert("名前とアイコンを選んでね！");
        if (mode === 'create') showScreen('screen-create-type');
        else showScreen('screen-room-input');
    }

    function createWithId() {
        const val = document.getElementById('custom-room-id').value.trim();
        socket.emit('create-room', val, (res) => {
            if (res.success) {
                myData.roomId = res.roomId;
                myData.isOwner = true;
                startChat();
            } else { alert(res.message); }
        });
    }

    function joinRoom() {
        const id = document.getElementById('room-id-input').value.trim();
        if (!id) return alert("合言葉を入れてね");
        socket.emit('join-room', { roomId: id, nickname: myData.nickname }, (res) => {
            if (res.success) {
                myData.roomId = id;
                myData.isOwner = false;
                startChat();
            } else { alert(res.message); }
        });
    }

    function startChat() {
        document.getElementById('chat-room-display').innerText = `合言葉: ${myData.roomId}`;
        document.getElementById('exit-btn').innerText = myData.isOwner ? "解散" : "退出";
        showScreen('screen-chat');
    }

    function exitAction() {
        if (myData.isOwner) {
            if (!confirm("ルームを解散しますか？")) return;
            socket.emit('terminate-room', myData.roomId);
        }
        location.reload();
    }

    function sendMessage() {
        const input = document.getElementById('message-input');
        if (!input.value.trim()) return;
        socket.emit('send-message', {
            roomId: myData.roomId,
            nickname: myData.nickname,
            icon: myData.icon,
            text: input.value,
            senderId: socket.id
        });
        input.value = '';
        input.focus();
    }

    // メッセージ受信
    socket.on('receive-message', (data) => {
        const container = document.getElementById('chat-messages');
        const div = document.createElement('div');
        const side = data.senderId === socket.id ? 'me' : 'other';
        div.className = `msg ${side}`;
        div.innerHTML = `<div class="msg-info">${data.icon} ${data.nickname}</div><div>${data.text}</div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    });

    socket.on('sys-message', (txt) => {
        const container = document.getElementById('chat-messages');
        const div = document.createElement('div');
        div.className = 'msg-sys';
        div.innerText = txt;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    });

    socket.on('room-terminated', () => {
        alert("ルームが終了されました");
        location.reload();
    });
</script>
</body>
</html>
