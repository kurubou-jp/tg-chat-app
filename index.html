<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chat LINE</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --line-bg: #74bad4;
            --line-green: #85e249;
            --white: #ffffff;
            --text-dark: #1d1d1f;
            --border: #e5e5e7;
        }

        /* iPadのタッチ操作を安定させる設定 */
        * {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            background-color: #f0f0f0;
            height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
            position: fixed; /* iOSでのスクロールバグを防止 */
            width: 100%;
        }

        #app {
            width: 100%;
            max-width: 500px;
            height: 100%;
            background-color: var(--white);
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .screen { display: none; padding: 20px; flex-direction: column; height: 100%; }
        .active { display: flex; }

        h2, h3 { text-align: center; color: var(--text-dark); margin-top: 20px; }

        /* ★iPadで絶対に反応させるボタン設定★ */
        button {
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 12px;
            -webkit-appearance: none;
            display: block;
            width: 100%;
            position: relative; /* タップ領域を一番前にする */
            z-index: 10;        /* 画面の裏に隠れるのを防ぐ */
            color: white;
        }

        /* 色の指定をCSSに分ける（これで参加ボタンが押せるようになる） */
        .btn-main { background-color: #2c3e50; }
        .btn-sub { background-color: #7f8c8d; }
        .btn-danger { background-color: #e74c3c; padding: 6px 12px; font-size: 12px; margin: 0; width: auto; }
        .btn-send { background-color: #007aff; width: auto; margin-bottom: 0; padding: 0 20px; border-radius: 25px; }

        button:active { opacity: 0.6; transform: scale(0.98); }

        input {
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 12px;
            background: #f8f9fa;
            width: 100%;
            -webkit-appearance: none;
            position: relative;
            z-index: 10;
        }

        /* アイコン選択 */
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin: 20px 0;
            overflow-y: auto;
            max-height: 200px;
            padding: 5px;
        }
        .icon-item {
            font-size: 28px;
            text-align: center;
            padding: 10px;
            border: 2px solid transparent;
            border-radius: 12px;
            background: #f2f2f7;
            cursor: pointer;
            z-index: 10;
            position: relative;
        }
        .icon-item.selected { border: 2px solid #007aff; background: #e1f0ff; }

        /* チャット画面 (LINE風) */
        .chat-header {
            padding: 10px 15px;
            background: #2c3e50;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
        }
        
        .chat-messages {
            flex: 1;
            background-color: var(--line-bg);
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            -webkit-overflow-scrolling: touch;
        }

        /* LINE風吹き出し */
        .msg {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 15px;
            font-size: 15px;
            position: relative;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .msg.me { align-self: flex-end; background-color: var(--line-green); color: #000; border-top-right-radius: 2px; }
        .msg.other { align-self: flex-start; background-color: var(--white); color: #000; border-top-left-radius: 2px; }
        .msg-info { font-size: 11px; margin-bottom: 3px; color: rgba(0,0,0,0.6); }

        .chat-input-area {
            padding: 10px;
            background: #ffffff;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            padding-bottom: env(safe-area-inset-bottom, 10px);
        }
        .chat-input-area input { flex: 1; margin-bottom: 0; border-radius: 25px; padding: 10px 15px; }

    </style>
</head>
<body>

<div id="app">
    <div id="screen-main" class="screen active">
        <h2 style="margin-top: 40px;">チャット</h2>
        <div style="flex:1; display:flex; flex-direction:column; justify-content:center;">
            <button type="button" class="btn-main" onclick="goToProfile('create')">新しく作る</button>
            <button type="button" class="btn-sub" onclick="goToProfile('join')">合言葉で入る</button>
        </div>
    </div>

    <div id="screen-profile" class="screen">
        <h3>プロフィール</h3>
        <input type="text" id="nickname" placeholder="ニックネーム" maxlength="10">
        <div class="icon-grid" id="icon-grid"></div>
        <button type="button" class="btn-main" onclick="handleProfileNext()">次へ</button>
    </div>

    <div id="screen-input" class="screen">
        <h3 id="input-title">ルーム設定</h3>
        <input type="text" id="room-id-input" placeholder="合言葉を決めてね">
        <button type="button" class="btn-main" onclick="handleRoomAction()" id="room-action-btn">決定</button>
        <button type="button" class="btn-sub" onclick="showScreen('screen-main')">戻る</button>
    </div>

    <div id="screen-chat" class="screen" style="padding:0">
        <div class="chat-header">
            <span id="chat-room-display">ID: ---</span>
            <button type="button" class="btn-danger" onclick="exitAction()">終了</button>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <form class="chat-input-area" onsubmit="sendMessage(); return false;">
            <input type="text" id="message-input" placeholder="メッセージ" autocomplete="off">
            <button type="submit" class="btn-send">送信</button>
        </form>
    </div>
</div>

<script>
    const socket = io({
        transports: ['websocket', 'polling'],
        reconnection: true
    });

    let mode = '', selectedIcon = '', myData = { nickname: '', icon: '', roomId: '', isOwner: false };
    const icons = ["😊", "🐱", "🐶", "🦊", "🐻", "🐯", "🤖", "👻", "⭐", "🍀", "🎨", "🎮", "⚽", "🍎", "🚀", "💎", "🐳", "🍕", "🌈", "🔥"];

    const iconGrid = document.getElementById('icon-grid');
    icons.forEach(icon => {
        const div = document.createElement('div');
        div.className = 'icon-item';
        div.innerText = icon;
        // iPad対応のためonclickを使用
        div.onclick = function() {
            document.querySelectorAll('.icon-item').forEach(el => el.classList.remove('selected'));
            div.classList.add('selected');
            selectedIcon = icon;
        };
        iconGrid.appendChild(div);
    });

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function goToProfile(m) {
        mode = m;
        showScreen('screen-profile');
    }

    function handleProfileNext() {
        myData.nickname = document.getElementById('nickname').value.trim();
        myData.icon = selectedIcon;
        if (!myData.nickname || !selectedIcon) return alert("名前とアイコンを選んでね！");
        
        document.getElementById('input-title').innerText = (mode === 'create') ? "ルーム作成" : "ルーム参加";
        document.getElementById('room-action-btn').innerText = (mode === 'create') ? "作成して開始" : "入室する";
        showScreen('screen-input');
    }

    function handleRoomAction() {
        const id = document.getElementById('room-id-input').value.trim();
        if (mode === 'create') {
            socket.emit('create-room', id, (res) => {
                if (res.success) { myData.roomId = res.roomId; myData.isOwner = true; startChat(); }
                else alert(res.message);
            });
        } else {
            if (!id) return alert("合言葉を入れてね！");
            socket.emit('join-room', { roomId: id, nickname: myData.nickname }, (res) => {
                if (res.success) { myData.roomId = id; myData.isOwner = false; startChat(); }
                else alert(res.message);
            });
        }
    }

    function startChat() {
        document.getElementById('chat-room-display').innerText = `ID: ${myData.roomId}`;
        showScreen('screen-chat');
    }

    function exitAction() {
        if (myData.isOwner) socket.emit('terminate-room', myData.roomId);
        location.reload();
    }

    function sendMessage() {
        const input = document.getElementById('message-input');
        if (!input.value.trim()) return;
        socket.emit('send-message', {
            roomId: myData.roomId,
            nickname: myData.nickname,
            icon: myData.icon,
            text: input.value,
            senderId: socket.id
        });
        input.value = '';
        input.focus();
    }

    socket.on('receive-message', (data) => {
        const container = document.getElementById('chat-messages');
        const div = document.createElement('div');
        const side = data.senderId === socket.id ? 'me' : 'other';
        div.className = `msg ${side}`;
        div.innerHTML = `<div class="msg-info">${data.icon} ${data.nickname}</div><div>${data.text}</div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    });

    socket.on('sys-message', (txt) => {
        const container = document.getElementById('chat-messages');
        const div = document.createElement('div');
        div.style = "align-self:center; font-size:12px; color:white; background:rgba(0,0,0,0.2); padding:4px 12px; border-radius:10px; margin:5px 0;";
        div.innerText = txt;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    });

    socket.on('room-terminated', () => { alert("ルームが終了しました"); location.reload(); });
</script>
</body>
</html>
