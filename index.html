<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAI Chat | Next Gen</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            background: radial-gradient(circle at top right, #1e1b4b, var(--bg-dark));
            color: var(--text);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #app {
            width: 100%;
            max-width: 480px;
            height: 90vh;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .screen { display: none; padding: 30px; flex-direction: column; height: 100%; box-sizing: border-box; }
        .active { display: flex; animation: fadeIn 0.4s ease-out; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1, h3 { text-align: center; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        input {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 16px;
            color: white;
            font-size: 16px;
            margin-bottom: 12px;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; background: rgba(255, 255, 255, 0.12); }

        button {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 12px;
            padding: 16px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
            touch-action: manipulation;
        }
        button:active { transform: scale(0.96); opacity: 0.9; }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin: 20px 0;
            padding: 10px;
            overflow-y: auto;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
        }
        .icon-item {
            font-size: 24px;
            padding: 10px;
            text-align: center;
            border-radius: 12px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }
        .icon-item:hover { background: rgba(255,255,255,0.05); }
        .icon-item.selected { border-color: var(--primary); background: rgba(99, 102, 241, 0.2); }

        /* Chat UI */
        .chat-header {
            padding: 15px 25px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .msg {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 15px;
            position: relative;
            backdrop-filter: blur(5px);
        }
        .msg.me {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .msg.other {
            align-self: flex-start;
            background: rgba(255,255,255,0.1);
            color: white;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--glass-border);
        }
        .msg-info { font-size: 11px; opacity: 0.7; margin-bottom: 4px; }
        .msg-sys { align-self: center; font-size: 11px; opacity: 0.5; background: rgba(255,255,255,0.1); padding: 4px 12px; border-radius: 10px; }

        .chat-input-area {
            padding: 20px;
            display: flex;
            gap: 10px;
            background: rgba(15, 23, 42, 0.8);
        }
        .chat-input-area input { flex: 1; margin-bottom: 0; border-radius: 25px; }
        .chat-input-area button { border-radius: 50%; width: 50px; height: 50px; padding: 0; display: flex; justify-content: center; align-items: center; margin-top: 0; }
    </style>
</head>
<body>

<div id="app">
    <div id="screen-main" class="screen active">
        <h1>RAI CHAT</h1>
        <div style="flex:1; display:flex; flex-direction:column; justify-content:center; gap:15px;">
            <button onclick="goToProfile('create')">CREATE ROOM</button>
            <button onclick="goToProfile('join')">JOIN ROOM</button>
        </div>
    </div>

    <div id="screen-profile" class="screen">
        <h3>WHO ARE YOU?</h3>
        <input type="text" id="nickname" placeholder="Nickname" maxlength="12">
        <div class="icon-grid" id="icon-grid"></div>
        <button onclick="handleProfileNext()">NEXT STEP</button>
    </div>

    <div id="screen-create-type" class="screen">
        <h3>ROOM SETTING</h3>
        <input type="text" id="custom-room-id" placeholder="Room ID (Optional)">
        <button onclick="createWithId()">START SERVER</button>
        <button onclick="showScreen('screen-main')" style="background:none; border: 1px solid var(--glass-border);">BACK</button>
    </div>

    <div id="screen-room-input" class="screen">
        <h3>ENTER ID</h3>
        <input type="text" id="room-id-input" placeholder="Room ID">
        <button onclick="joinRoom()">JOIN NOW</button>
        <button onclick="showScreen('screen-main')" style="background:none; border: 1px solid var(--glass-border);">BACK</button>
    </div>

    <div id="screen-chat" class="screen" style="padding:0">
        <div class="chat-header">
            <span id="chat-room-display" style="font-weight:bold; color:var(--primary)">ID: ---</span>
            <button onclick="exitAction()" style="background:#ef4444; padding:6px 15px; font-size:12px; margin:0;" id="exit-btn">EXIT</button>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <form class="chat-input-area" onsubmit="sendMessage(); return false;">
            <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
            <button type="submit">▶</button>
        </form>
    </div>
</div>

<script>
    const socket = io({
        transports: ['websocket', 'polling'],
        reconnectionAttempts: 10
    });

    let mode = '', selectedIcon = '', myData = { nickname: '', icon: '', roomId: '', isOwner: false };
    const icons = ["👤", "😎", "👾", "🐱", "🦊", "🐯", "🤖", "👻", "⭐", "🎨", "🎮", "⚽", "🚀", "💎", "🐳", "🍕", "🌈", "🔥", "🪐", "⚡"];

    const iconGrid = document.getElementById('icon-grid');
    icons.forEach(icon => {
        const div = document.createElement('div');
        div.className = 'icon-item';
        div.innerText = icon;
        div.onclick = () => {
            document.querySelectorAll('.icon-item').forEach(el => el.classList.remove('selected'));
            div.classList.add('selected');
            selectedIcon = icon;
        };
        iconGrid.appendChild(div);
    });

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function goToProfile(m) { mode = m; showScreen('screen-profile'); }

    function handleProfileNext() {
        myData.nickname = document.getElementById('nickname').value.trim();
        myData.icon = selectedIcon;
        if (!myData.nickname || !selectedIcon) return alert("Enter nickname & Choose icon");
        if (mode === 'create') showScreen('screen-create-type');
        else showScreen('screen-room-input');
    }

    function createWithId() {
        const val = document.getElementById('custom-room-id').value.trim();
        socket.emit('create-room', val, (res) => {
            if (res.success) {
                myData.roomId = res.roomId;
                myData.isOwner = true;
                startChat();
            } else { alert(res.message); }
        });
    }

    function joinRoom() {
        const id = document.getElementById('room-id-input').value.trim();
        if (!id) return alert("Enter Room ID");
        socket.emit('join-room', { roomId: id, nickname: myData.nickname }, (res) => {
            if (res.success) {
                myData.roomId = id;
                myData.isOwner = false;
                startChat();
            } else { alert(res.message); }
        });
    }

    function startChat() {
        document.getElementById('chat-room-display').innerText = `ID: ${myData.roomId}`;
        document.getElementById('exit-btn').innerText = myData.isOwner ? "CLOSE" : "EXIT";
        showScreen('screen-chat');
    }

    function exitAction() {
        if (myData.isOwner && !confirm("Close this room?")) return;
        if (myData.isOwner) socket.emit('terminate-room', myData.roomId);
        location.reload();
    }

    function sendMessage() {
        const input = document.getElementById('message-input');
        if (!input.value.trim()) return;
        socket.emit('send-message', {
            roomId: myData.roomId,
            nickname: myData.nickname,
            icon: myData.icon,
            text: input.value,
            senderId: socket.id
        });
        input.value = '';
    }

    socket.on('receive-message', (data) => {
        const container = document.getElementById('chat-messages');
        const div = document.createElement('div');
        const side = data.senderId === socket.id ? 'me' : 'other';
        div.className = `msg ${side}`;
        div.innerHTML = `<div class="msg-info">${data.icon} ${data.nickname}</div><div>${data.text}</div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    });

    socket.on('sys-message', (txt) => {
        const container = document.getElementById('chat-messages');
        const div = document.createElement('div');
        div.className = 'msg-sys';
        div.innerText = txt;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    });

    socket.on('room-terminated', () => { alert("Room Closed"); location.reload(); });
</script>
</body>
</html>
