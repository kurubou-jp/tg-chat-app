<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAI Chat Simple</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* モダンな白基調のデザイン */
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --primary: #007aff; /* Apple風のブルー */
            --text: #1d1d1f;
            --border: #e5e5e7;
            --msg-me: #007aff;
            --msg-other: #e9e9eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            -webkit-text-size-adjust: 100%;
        }

        #app {
            width: 100%;
            max-width: 500px;
            height: 100dvh;
            background-color: var(--card);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        .screen { display: none; padding: 24px; flex-direction: column; height: 100%; box-sizing: border-box; }
        .active { display: flex; }

        h1 { font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 30px; }

        /* iPadで確実に押せるボタン設定 */
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
            transition: opacity 0.2s;
            touch-action: manipulation; /* iPadの遅延防止 */
            -webkit-appearance: none;
        }
        button:active { opacity: 0.7; }
        .btn-sub { background-color: var(--border); color: var(--text); }

        input {
            background-color: #f2f2f7;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            font-size: 16px;
            margin-bottom: 16px;
            outline: none;
            -webkit-appearance: none;
        }

        /* アイコン選択 */
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin: 20px 0;
            overflow-y: auto;
        }
        .icon-item {
            font-size: 24px;
            padding: 10px;
            text-align: center;
            border-radius: 12px;
            border: 2px solid transparent;
            background: #f2f2f7;
        }
        .icon-item.selected { border-color: var(--primary); background: #e1f0ff; }

        /* チャット画面 */
        .chat-header {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
        }
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: white;
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-overflow-scrolling: touch;
        }

        .msg {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
        }
        .msg.me { align-self: flex-end; background-color: var(--msg-me); color: white; }
        .msg.other { align-self: flex-start; background-color: var(--msg-other); color: black; }
        .msg-info { font-size: 11px; margin-bottom: 2px; opacity: 0.6; }

        .chat-input-area {
            padding: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            background: white;
        }
        .chat-input-area input { flex: 1; margin-bottom: 0; border-radius: 20px; }
        .chat-input-area button { margin-bottom: 0; padding: 10px 20px; border-radius: 20px; }
    </style>
</head>
<body>

<div id="app">
    <div id="screen-main" class="screen active">
        <h1>らいのチャット</h1>
        <button onclick="goToProfile('create')">新しく作る</button>
        <button onclick="goToProfile('join')" class="btn-sub">合言葉で入る</button>
    </div>

    <div id="screen-profile" class="screen">
        <h3>プロフィール</h3>
        <input type="text" id="nickname" placeholder="ニックネーム" maxlength="12">
        <div class="icon-grid" id="icon-grid"></div>
        <button onclick="handleProfileNext()">次へ</button>
    </div>

    <div id="screen-input" class="screen">
        <h3 id="input-title">設定</h3>
        <input type="text" id="room-id-input" placeholder="合言葉（例：ひみつ）">
        <button onclick="handleRoomAction()" id="room-action-btn">決定</button>
        <button onclick="showScreen('screen-main')" class="btn-sub">戻る</button>
    </div>

    <div id="screen-chat" class="screen" style="padding:0">
        <div class="chat-header">
            <span id="chat-room-display" style="font-weight:600">ID: ---</span>
            <button onclick="exitAction()" style="background:#ff3b30; padding:6px 12px; font-size:12px; margin:0;">終了</button>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <form class="chat-input-area" onsubmit="sendMessage(); return false;">
            <input type="text" id="message-input" placeholder="メッセージ" autocomplete="off">
            <button type="submit">送信</button>
        </form>
    </div>
</div>

<script>
    const socket = io({
        transports: ['websocket', 'polling'],
        reconnectionAttempts: 10
    });

    let mode = '', selectedIcon = '', myData = { nickname: '', icon: '', roomId: '', isOwner: false };
    const icons = ["👤", "🐱", "🐶", "🦊", "🐻", "🐯", "🤖", "👻", "⭐", "🎨", "🎮", "⚽", "🚀", "💎", "🐳", "🍕", "🌈", "🔥", "🪐", "⚡"];

    const iconGrid = document.getElementById('icon-grid');
    icons.forEach(icon => {
        const div = document.createElement('div');
        div.className = 'icon-item';
        div.innerText = icon;
        div.onclick = () => {
            document.querySelectorAll('.icon-item').forEach(el => el.classList.remove('selected'));
            div.classList.add('selected');
            selectedIcon = icon;
        };
        iconGrid.appendChild(div);
    });

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function goToProfile(m) {
        mode = m;
        showScreen('screen-profile');
    }

    function handleProfileNext() {
        myData.nickname = document.getElementById('nickname').value.trim();
        myData.icon = selectedIcon;
        if (!myData.nickname || !selectedIcon) return alert("名前とアイコンを選んでな！");
        
        document.getElementById('input-title').innerText = (mode === 'create') ? "ルーム作成" : "ルーム参加";
        document.getElementById('room-action-btn').innerText = (mode === 'create') ? "作成して開始" : "入室する";
        showScreen('screen-input');
    }

    function handleRoomAction() {
        const id = document.getElementById('room-id-input').value.trim();
        if (mode === 'create') {
            socket.emit('create-room', id, (res) => {
                if (res.success) { myData.roomId = res.roomId; myData.isOwner = true; startChat(); }
                else alert(res.message);
            });
        } else {
            if (!id) return alert("合言葉を入れてな！");
            socket.emit('join-room', { roomId: id, nickname: myData.nickname }, (res) => {
                if (res.success) { myData.roomId = id; myData.isOwner = false; startChat(); }
                else alert(res.message);
            });
        }
    }

    function startChat() {
        document.getElementById('chat-room-display').innerText = `ID: ${myData.roomId}`;
        showScreen('screen-chat');
    }

    function exitAction() {
        if (myData.isOwner) socket.emit('terminate-room', myData.roomId);
        location.reload();
    }

    function sendMessage() {
        const input = document.getElementById('message-input');
        if (!input.value.trim()) return;
        socket.emit('send-message', {
            roomId: myData.roomId,
            nickname: myData.nickname,
            icon: myData.icon,
            text: input.value,
            senderId: socket.id
        });
        input.value = '';
    }

    socket.on('receive-message', (data) => {
        const container = document.getElementById('chat-messages');
        const div = document.createElement('div');
        const side = data.senderId === socket.id ? 'me' : 'other';
        div.className = `msg ${side}`;
        div.innerHTML = `<div class="msg-info">${data.icon} ${data.nickname}</div><div>${data.text}</div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    });

    socket.on('room-terminated', () => { alert("終了しました"); location.reload(); });
</script>
</body>
</html>
