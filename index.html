<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RAI Chat Final</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #f5f5f5;
            --line-green: #85e249;
            --line-blue: #74bad4;
        }

        * { box-sizing: border-box; touch-action: manipulation; }
        
        body {
            font-family: sans-serif;
            margin: 0;
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
            /* iOSのバウンス（揺れ）対策 */
            position: fixed;
            width: 100%;
        }

        #app {
            width: 100%;
            max-width: 500px;
            height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            /* 下のバーに被らないようにする設定 */
            padding-bottom: env(safe-area-inset-bottom);
        }

        .screen { display: none; padding: 20px; flex-direction: column; height: 100%; }
        .active { display: flex; }

        input {
            padding: 15px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 10px;
            outline: none;
            -webkit-appearance: none; /* iOS特有の影を消す */
        }

        button {
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            background: #333;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 20px;
            overflow-y: auto;
        }
        .icon-item {
            font-size: 24px;
            text-align: center;
            padding: 8px;
            background: #eee;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .icon-item.selected { border-color: #007aff; background: #e1f0ff; }

        .chat-messages {
            flex: 1;
            background: var(--line-blue);
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            -webkit-overflow-scrolling: touch;
        }
        .msg {
            max-width: 80%;
            padding: 10px;
            border-radius: 12px;
            font-size: 15px;
            word-wrap: break-word;
        }
        .msg.me { align-self: flex-end; background: var(--line-green); }
        .msg.other { align-self: flex-start; background: white; }

        .msg-sys {
            align-self: center;
            background: rgba(0,0,0,0.15);
            color: white;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            margin: 5px 0;
        }

        /* チャット入力エリア（ここが隠れないように調整） */
        .chat-input-area {
            padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
            display: flex;
            gap: 5px;
            border-top: 1px solid #ddd;
            background: white;
        }
        .chat-input-area input { flex: 1; margin-bottom: 0; border-radius: 20px; }
    </style>
</head>
<body>

<div id="app">
    <div id="screen-main" class="screen active">
        <h2 style="text-align:center">らいのチャット</h2>
        <div style="flex:1; display:flex; flex-direction:column; justify-content:center">
            <button onclick="goToProfile('create')">新しく作る (Enter)</button>
            <button onclick="goToProfile('join')" style="background:#666">合言葉で入る</button>
        </div>
    </div>

    <div id="screen-profile" class="screen">
        <h3>プロフィール</h3>
        <input type="text" id="nickname" placeholder="ニックネーム" onkeydown="if(event.key==='Enter')handleProfileNext()">
        <div class="icon-grid" id="icon-grid"></div>
        <button onclick="handleProfileNext()">次へ (Enter)</button>
    </div>

    <div id="screen-input" class="screen">
        <h3 id="input-title">設定</h3>
        <input type="text" id="room-id-input" placeholder="合言葉" onkeydown="if(event.key==='Enter')handleRoomAction()">
        <button onclick="handleRoomAction()" id="room-action-btn">決定 (Enter)</button>
        <button onclick="showScreen('screen-main')" style="background:#666">戻る</button>
    </div>

    <div id="screen-chat" class="screen" style="padding:0">
        <div style="padding:10px; background:#333; color:white; display:flex; justify-content:space-between; align-items:center">
            <span id="room-id-display">ID: ---</span>
            <button onclick="location.reload()" style="margin:0; padding:5px 10px; font-size:12px; background:#e74c3c">終了</button>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <form class="chat-input-area" onsubmit="sendMessage(); return false;">
            <input type="text" id="message-input" placeholder="メッセージ" autocomplete="off">
            <button type="submit" style="margin:0; padding:5px 15px; background:#007aff; color:white; border-radius:20px;">送信</button>
        </form>
    </div>
</div>

<script>
    const socket = io();
    let mode = '', selectedIcon = '😊', myData = { nickname: '', icon: '', roomId: '' };
    const icons = ["😊", "🐱", "🐶", "🦊", "🐻", "🐯", "🤖", "👻", "⭐", "🍀", "🎨", "🎮", "⚽", "🍎", "🚀", "💎", "🐳", "🍕", "🌈", "🔥"];

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        if (type === 'su') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(800, now);
            osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
            gain.gain.setValueAtTime(0.3, now); gain.gain.linearRampToValueAtTime(0, now + 0.1);
            osc.start(); osc.stop(now + 0.1);
        } else if (type === 'piron') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(660, now);
            osc.frequency.setValueAtTime(880, now + 0.1);
            gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.3);
            osc.start(); osc.stop(now + 0.3);
        } else if (type === 'pon') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(400, now);
            osc.frequency.exponentialRampToValueAtTime(600, now + 0.05);
            gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.1);
            osc.start(); osc.stop(now + 0.1);
        }
    }

    const iconGrid = document.getElementById('icon-grid');
    icons.forEach(icon => {
        const div = document.createElement('div');
        div.className = 'icon-item' + (icon === '😊' ? ' selected' : '');
        div.innerText = icon;
        div.onclick = () => {
            playSound('su');
            document.querySelectorAll('.icon-item').forEach(el => el.classList.remove('selected'));
            div.classList.add('selected');
            selectedIcon = icon;
        };
        iconGrid.appendChild(div);
    });

    window.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const active = document.querySelector('.screen.active').id;
            if (active === 'screen-main') goToProfile('create');
        }
    });

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        const input = document.getElementById(id).querySelector('input');
        if (input) setTimeout(() => input.focus(), 200);
    }

    function goToProfile(m) { playSound('su'); mode = m; showScreen('screen-profile'); }

    function handleProfileNext() {
        playSound('su');
        myData.nickname = document.getElementById('nickname').value.trim();
        myData.icon = selectedIcon;
        if (!myData.nickname) return alert("名前を入れてな！");
        document.getElementById('input-title').innerText = (mode === 'create') ? "ルーム作成" : "ルーム参加";
        showScreen('screen-input');
    }

    function handleRoomAction() {
        const id = document.getElementById('room-id-input').value.trim();
        if (mode === 'create') {
            socket.emit('create-room', id, (res) => {
                if (res.success) { playSound('piron'); myData.roomId = res.roomId; startChat(); }
                else alert(res.message);
            });
        } else {
            if (!id) return alert("合言葉をいれてな！");
            socket.emit('join-room', { roomId: id, nickname: myData.nickname }, (res) => {
                if (res.success) { playSound('piron'); myData.roomId = id; startChat(); }
                else alert(res.message);
            });
        }
    }

    function startChat() {
        document.getElementById('room-id-display').innerText = `ID: ${myData.roomId}`;
        showScreen('screen-chat');
    }

    function sendMessage() {
        const input = document.getElementById('message-input');
        if (!input.value.trim()) return;
        playSound('pon');
        socket.emit('send-message', {
            roomId: myData.roomId, nickname: myData.nickname, icon: myData.icon, text: input.value, senderId: socket.id
        });
        input.value = '';
        input.focus();
    }

    socket.on('receive-message', (data) => {
        if (data.senderId !== socket.id) playSound('pon');
        const container = document.getElementById('chat-messages');
        const div = document.createElement('div');
        div.className = `msg ${data.senderId === socket.id ? 'me' : 'other'}`;
        div.innerHTML = `<div style="font-size:10px;opacity:0.6">${data.icon} ${data.nickname}</div>${data.text}`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    });

    socket.on('sys-message', (txt) => {
        const container = document.getElementById('chat-messages');
        const div = document.createElement('div');
        div.className = 'msg-sys';
        div.innerText = txt;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    });
</script>
</body>
</html>
